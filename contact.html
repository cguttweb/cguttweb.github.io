---
layout: default
title: Contact Page
---
<div class="wrapper">
    <div class="form">
        <form action="">
            <div>
                <label for="name">Name:</label>
                <input type="text" name="name" placeholder="Joe Bloggs">
            </div>

            <div>
                <label>Email Address:</label>
                <input type="email" name="email" placeholder="joebloggs@example.com">
            </div>

            <div>
                <label>Message</label>
                <textarea name="message" id="" cols="30" rows="10" placeholder="Your message here"></textarea>
            </div>

              <div><button type="submit" id="submit_form">Submit</button>
              </div>
        </form>
    </div>
</div>
