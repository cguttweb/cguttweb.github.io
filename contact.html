<div class="wrapper">
    <div class="form">
        <form action="" name="contactForm" id="form">
            <div>
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" placeholder="Joe Bloggs">
            </div>

            <div>
                <label>Email Address:</label>
                <input type="email" name="email" id="email" placeholder="joebloggs@example.com">
            </div>

            <div>
                <label>Message</label>
                <textarea name="message" id="message" cols="30" rows="10" placeholder="Your message here"></textarea>
            </div>

              <div><button type="submit" id="submit_form">Submit</button>
              </div>
        </form>
        <script>
            const form = document.getElementsByTagName('form');
            const thankYouMsg = 'Thank you for submitting the form I will get back to you shortly.'
            const submitBtn = document.getElementById('submit_form');
            submitBtn.addEventListener('click', (e) => {
                form.style.display = 'none';
                // thankYouMsg.style.display = 'block';
                // setTimeout( () => {
                //     window.open('https://cguttweb.github.io');
                // }, 3000)
               
            })
            
        </script>
    </div>
</div>
